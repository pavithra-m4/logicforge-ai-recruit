<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Forge AI Recruit</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <div class="hero">

        <h1>LOGIC FORGE AI RECRUIT</h1>

        <p>
            Intelligent AI Candidate Ranking System
        </p>

    </div>


    <div class="upload-card">

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <label>
                Upload Job Description
            </label>

            <input
                type="file"
                name="job_file"
                required
            >

            <label>
                Upload Candidate Dataset (.jsonl)
            </label>

            <input
                type="file"
                name="candidate_file"
                required
            >

            <button type="submit">
                🚀 Start AI Ranking
            </button>

        </form>

    </div>

</div>

</body>
</html>
