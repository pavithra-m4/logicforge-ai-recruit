<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Company Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{

            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#eef5ff;

        }

        .login-box{

            width:420px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.15);

        }

        h1{

            text-align:center;
            color:#2563eb;
            margin-bottom:10px;

        }

        p{

            text-align:center;
            color:#666;
            margin-bottom:30px;

        }

        input{

            width:100%;
            padding:14px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;

        }

        button{

            width:100%;
            padding:15px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:18px;

        }

        button:hover{

            background:#1d4ed8;

        }

    </style>

</head>

<body>

<div class="login-box">

<h1>🏢 Company Login</h1>

<p>Logic Forge AI Recruit</p>

<form action="/dashboard">

<input
type="email"
placeholder="Company Email"
required>

<input
type="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

</div>

</body>

</html>
